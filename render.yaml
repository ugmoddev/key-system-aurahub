# render.yaml
services:
  # ===== BACKEND API =====
  - type: web
    name: api-key-manager-backend
    runtime: node
    plan: free
    region: singapore
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: API_SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://api-key-manager-frontend.onrender.com
      - key: LOG_LEVEL
        value: info

  # ===== FRONTEND STATIC =====
  - type: static
    name: api-key-manager-frontend
    runtime: static
    plan: free
    region: singapore
    buildCommand: echo "No build needed"
    staticPublishPath: ./frontend
    envVars:
      - key: API_URL
        value: https://api-key-manager-backend.onrender.com
